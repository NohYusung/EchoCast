name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 변경 감지 단계. 이후 CI/CD job이 back/front/common 중 어디를 검사할지 결정한다.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      common: ${{ steps.filter.outputs.common }}
      back: ${{ steps.filter.outputs.back }}
      front: ${{ steps.filter.outputs.front }}
    steps:
      # 변경 파일을 비교하려면 repository checkout이 먼저 필요하다.
      - name: Checkout
        uses: actions/checkout@v4

      # path filter로 common/back/front 변경 여부를 job output으로 만든다.
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            common:
              - ".github/workflows/**"
              - "package.json"
              - "package-lock.json"
              - "tsconfig.base.json"
              - ".prettierrc"
            back:
              - "back/**"
            front:
              - "front/**"

  # 백엔드 검증 단계. 백엔드 또는 공통 파일 변경 시 타입체크와 테스트를 실행한다.
  back_ci:
    name: Back CI
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.common == 'true' || needs.changes.outputs.back == 'true' }}
    runs-on: ubuntu-latest
    steps:
      # 백엔드 소스와 workspace package 정보를 runner에 가져온다.
      - name: Checkout
        uses: actions/checkout@v4

      # repository의 Node 22 런타임과 npm cache를 준비한다.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # lockfile 기준으로 back/front workspace 의존성을 재현 가능하게 설치한다.
      - name: Install dependencies
        run: npm ci

      # Nest 백엔드 TypeScript 타입 오류를 배포 전에 차단한다.
      - name: Typecheck back
        run: npm run typecheck --workspace @new-dubright/back

      # 백엔드 unit/e2e 테스트를 실행해 API 계약과 도메인 로직 회귀를 막는다.
      - name: Test back
        run: npm run test --workspace @new-dubright/back

  # 프론트엔드 검증 단계. 프론트 또는 공통 파일 변경 시 타입체크, 테스트, 빌드를 실행한다.
  front_ci:
    name: Front CI
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.common == 'true' || needs.changes.outputs.front == 'true' }}
    runs-on: ubuntu-latest
    steps:
      # 프론트 소스와 workspace package 정보를 runner에 가져온다.
      - name: Checkout
        uses: actions/checkout@v4

      # repository의 Node 22 런타임과 npm cache를 준비한다.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # lockfile 기준으로 back/front workspace 의존성을 재현 가능하게 설치한다.
      - name: Install dependencies
        run: npm ci

      # Next.js 프론트 TypeScript 타입 오류를 배포 전에 차단한다.
      - name: Typecheck front
        run: npm run typecheck --workspace @new-dubright/front

      # 프론트 테스트를 실행해 플레이어/스튜디오 UI 로직 회귀를 막는다.
      - name: Test front
        run: npm run test --workspace @new-dubright/front

      # production Next.js build가 가능한지 확인한다.
      - name: Build front
        run: npm run build --workspace @new-dubright/front

  # 백엔드 산출물 보관 단계. push/manual 실행에서 빌드 결과를 artifact로 남긴다.
  backend_delivery:
    name: Backend delivery artifact
    needs:
      - changes
      - back_ci
    if: ${{ github.event_name != 'pull_request' && needs.back_ci.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.common == 'true' || needs.changes.outputs.back == 'true') }}
    runs-on: ubuntu-latest
    steps:
      # 백엔드 빌드 대상 소스를 runner에 가져온다.
      - name: Checkout
        uses: actions/checkout@v4

      # 백엔드 빌드를 위한 Node 22 런타임과 npm cache를 준비한다.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # lockfile 기준 의존성을 설치해 CI와 로컬 빌드 차이를 줄인다.
      - name: Install dependencies
        run: npm ci

      # Nest 백엔드를 dist 산출물로 컴파일한다.
      - name: Build backend
        run: npm run build --workspace @new-dubright/back

      # dist와 package 정보를 GitHub artifact로 저장해 배포 조사나 재사용이 가능하게 한다.
      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-dubright-backend
          path: |
            back/dist
            back/package.json
          if-no-files-found: error
          retention-days: 14

  # 프론트 산출물 보관 단계. push/manual 실행에서 Next.js build 결과를 artifact로 남긴다.
  frontend_delivery:
    name: Frontend delivery artifact
    needs:
      - changes
      - front_ci
    if: ${{ github.event_name != 'pull_request' && needs.front_ci.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.common == 'true' || needs.changes.outputs.front == 'true') }}
    runs-on: ubuntu-latest
    steps:
      # 프론트 빌드 대상 소스를 runner에 가져온다.
      - name: Checkout
        uses: actions/checkout@v4

      # 프론트 빌드를 위한 Node 22 런타임과 npm cache를 준비한다.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # lockfile 기준 의존성을 설치해 CI와 로컬 빌드 차이를 줄인다.
      - name: Install dependencies
        run: npm ci

      # Next.js production build 산출물을 생성한다.
      - name: Build frontend
        run: npm run build --workspace @new-dubright/front

      # .next, public, package 정보를 GitHub artifact로 저장한다.
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-dubright-frontend
          path: |
            front/.next
            front/public
            front/package.json
          if-no-files-found: error
          retention-days: 14

  # 백엔드 dev ECS 배포 단계. main push에서 ECR 이미지 push 후 기존 ECS service를 업데이트한다.
  backend_deploy:
    name: Backend deploy to dev ECS
    needs:
      - changes
      - back_ci
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.back_ci.result == 'success' && (needs.changes.outputs.common == 'true' || needs.changes.outputs.back == 'true') && vars.BACKEND_DEPLOY_ENABLED != 'false' }}
    runs-on: ubuntu-latest
    environment: backend-dev
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      BACKEND_ECR_REPOSITORY: ${{ vars.BACKEND_ECR_REPOSITORY || 'new-dubright-back-dev' }}
      BACKEND_ECS_CLUSTER: ${{ vars.BACKEND_ECS_CLUSTER || 'dev-ecs' }}
      BACKEND_ECS_SERVICE: ${{ vars.BACKEND_ECS_SERVICE || 'new-dubright-back-task-dev-service-h9wg7sei' }}
      BACKEND_LOG_GROUP: ${{ vars.BACKEND_LOG_GROUP || '/ecs/new-dubright-back-task-dev' }}
      BACKEND_SECRET_ARN: ${{ vars.BACKEND_SECRET_ARN || 'arn:aws:secretsmanager:ap-northeast-2:471112500555:secret:dev/new-dubright/back-ulvm9v' }}
      BACKEND_TASK_ROLE_ARN: ${{ vars.BACKEND_TASK_ROLE_ARN || 'arn:aws:iam::471112500555:role/DevEcsTaskIAM' }}
      BACKEND_EXECUTION_ROLE_ARN: ${{ vars.BACKEND_EXECUTION_ROLE_ARN || 'arn:aws:iam::471112500555:role/ecsTaskExecutionRole' }}
    steps:
      # Docker build context와 task definition 템플릿을 runner에 가져온다.
      - name: Checkout
        uses: actions/checkout@v4

      # 배포에 필요한 AWS/ECS/ECR 변수 누락을 이미지 빌드 전에 빠르게 실패시킨다.
      - name: Validate backend deploy variables
        run: |
          test -n "$AWS_REGION"
          test -n "$BACKEND_ECR_REPOSITORY"
          test -n "$BACKEND_ECS_CLUSTER"
          test -n "$BACKEND_ECS_SERVICE"
          test -n "$BACKEND_LOG_GROUP"
          test -n "$BACKEND_SECRET_ARN"
          test -n "$BACKEND_TASK_ROLE_ARN"
          test -n "$BACKEND_EXECUTION_ROLE_ARN"

      # AWS 인증 방식이 하나도 설정되지 않았으면 ECR build/push 전에 명확한 메시지로 실패시킨다.
      - name: Validate AWS credential inputs
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -n "$AWS_ROLE_TO_ASSUME" ]; then
            exit 0
          fi

          if [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ]; then
            exit 0
          fi

          echo "AWS credentials are not configured."
          echo "Set repository variable AWS_ROLE_TO_ASSUME for OIDC, or set repository secrets AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY."
          exit 1

      # OIDC role이 설정된 경우 GitHub Actions가 장기 access key 없이 AWS 권한을 얻는다.
      - name: Configure AWS credentials with OIDC role
        if: ${{ env.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}

      # OIDC role이 없으면 repository secret의 AWS access key로 AWS 권한을 얻는다.
      - name: Configure AWS credentials with access keys
        if: ${{ env.AWS_ROLE_TO_ASSUME == '' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # Docker image push를 위해 Amazon ECR registry에 로그인한다.
      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 현재 commit SHA 태그와 latest 태그를 같은 ECR repository 기준으로 만든다.
      - name: Resolve backend image tags
        id: image
        run: |
          image_repository="${{ steps.ecr.outputs.registry }}/${BACKEND_ECR_REPOSITORY}"
          echo "uri=${image_repository}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest=${image_repository}:latest" >> "$GITHUB_OUTPUT"

      # GitHub hosted runner에서 arm64 image build를 지원하도록 QEMU를 준비한다.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # Docker Buildx builder를 준비해 cache와 multi-platform build를 사용할 수 있게 한다.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # back/Dockerfile로 linux/arm64 백엔드 이미지를 빌드하고 ECR에 push한다.
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: back/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ steps.image.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ECS task log가 CloudWatch Logs에 쌓일 log group을 보장한다.
      - name: Ensure backend log group
        run: |
          aws logs create-log-group --region "$AWS_REGION" --log-group-name "$BACKEND_LOG_GROUP" || true

      # repository의 ECS task definition 템플릿에 이미지, secret, role, log 설정을 주입한다.
      - name: Render backend task definition
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
        run: |
          sed \
            -e "s#__IMAGE_URI__#${IMAGE_URI}#g" \
            -e "s#__SECRET_ARN__#${BACKEND_SECRET_ARN}#g" \
            -e "s#__LOG_GROUP__#${BACKEND_LOG_GROUP}#g" \
            -e "s#__AWS_REGION__#${AWS_REGION}#g" \
            -e "s#__TASK_ROLE_ARN__#${BACKEND_TASK_ROLE_ARN}#g" \
            -e "s#__EXECUTION_ROLE_ARN__#${BACKEND_EXECUTION_ROLE_ARN}#g" \
            back/ecs/task-definition.dev.json > task-definition.json

      # 현재 workflow는 기존 ECS service 업데이트 전용이므로 대상 service 존재 여부를 확인한다.
      - name: Verify ECS service exists
        run: |
          status="$(aws ecs describe-services \
            --region "$AWS_REGION" \
            --cluster "$BACKEND_ECS_CLUSTER" \
            --services "$BACKEND_ECS_SERVICE" \
            --query 'services[0].status' \
            --output text)"
          if [ "$status" != "ACTIVE" ]; then
            echo "ECS service is not ACTIVE: ${BACKEND_ECS_CLUSTER}/${BACKEND_ECS_SERVICE} (${status})"
            exit 1
          fi

      # 새 task definition revision을 등록하고 ECS service가 새 이미지로 안정화될 때까지 기다린다.
      - name: Deploy backend task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-definition.json
          cluster: ${{ env.BACKEND_ECS_CLUSTER }}
          service: ${{ env.BACKEND_ECS_SERVICE }}
          wait-for-service-stability: true

  # 프론트 배포 placeholder. Amplify 등 실제 프론트 배포 방식이 정해지기 전까지 의도적으로 실패한다.
  frontend_deploy:
    name: Frontend deploy
    needs: frontend_delivery
    if: ${{ vars.FRONTEND_DEPLOY_ENABLED == 'true' && needs.frontend_delivery.result == 'success' }}
    runs-on: ubuntu-latest
    environment: frontend-production
    steps:
      # FRONTEND_DEPLOY_ENABLED=true로 켜기 전에 실제 배포 명령을 먼저 구현하도록 막는다.
      - name: Deployment is not configured
        run: |
          echo "Configure the frontend deployment command before setting FRONTEND_DEPLOY_ENABLED=true."
          exit 1

  # 전체 CI/CD 결과 집계 단계. skipped job은 허용하고 failure/cancelled만 최종 실패로 올린다.
  ci_cd_summary:
    name: CI/CD summary
    needs:
      - changes
      - back_ci
      - front_ci
      - backend_delivery
      - frontend_delivery
      - backend_deploy
      - frontend_deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      # needs 결과를 출력하고 실패한 필수 job이 있으면 workflow를 실패 처리한다.
      - name: Check CI/CD result
        run: |
          echo "changes=${{ needs.changes.result }}"
          echo "back_ci=${{ needs.back_ci.result }}"
          echo "front_ci=${{ needs.front_ci.result }}"
          echo "backend_delivery=${{ needs.backend_delivery.result }}"
          echo "frontend_delivery=${{ needs.frontend_delivery.result }}"
          echo "backend_deploy=${{ needs.backend_deploy.result }}"
          echo "frontend_deploy=${{ needs.frontend_deploy.result }}"

          if [ "${{ needs.changes.result }}" = "failure" ] || [ "${{ needs.changes.result }}" = "cancelled" ]; then
            exit 1
          fi

          if [ "${{ needs.back_ci.result }}" = "failure" ] || [ "${{ needs.back_ci.result }}" = "cancelled" ]; then
            exit 1
          fi

          if [ "${{ needs.front_ci.result }}" = "failure" ] || [ "${{ needs.front_ci.result }}" = "cancelled" ]; then
            exit 1
          fi

          if [ "${{ needs.backend_delivery.result }}" = "failure" ] || [ "${{ needs.backend_delivery.result }}" = "cancelled" ]; then
            exit 1
          fi

          if [ "${{ needs.frontend_delivery.result }}" = "failure" ] || [ "${{ needs.frontend_delivery.result }}" = "cancelled" ]; then
            exit 1
          fi

          if [ "${{ needs.backend_deploy.result }}" = "failure" ] || [ "${{ needs.backend_deploy.result }}" = "cancelled" ]; then
            exit 1
          fi

          if [ "${{ needs.frontend_deploy.result }}" = "failure" ] || [ "${{ needs.frontend_deploy.result }}" = "cancelled" ]; then
            exit 1
          fi
